<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공강구조대 | 메인</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <!-- 공통 네비게이션 -->
  <header class="site-header">
    <nav class="navbar">
      <a href="main.html" class="logo" data-i18n="site_logo">공강구조대</a>

      <ul class="nav-menu">
        <li><a href="main.html" class="active" data-i18n="nav_home">홈</a></li>
        <li><a href="team.html" data-i18n="nav_team">팀원 소개</a></li>
        <li><a href="game.html" data-i18n="nav_game">게임</a></li>
        <li><a href="form.html" data-i18n="nav_form">공강 추천</a></li>
      </ul>

      <select id="lang-selector" class="language-selector" aria-label="Language selector">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ja">日本語</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="ru">Русский</option>
      </select>
    </nav>
  </header>

  <div id="app">
    <!-- main.html 내부 헤더 -->
    <header>
      <div class="app-logo" data-i18n="app_logo">공강구조대</div>
    </header>

    <!-- main.html 내부 탭 네비게이션 -->
    <nav class="tab-menu">
      <button type="button" class="btn nav-btn active" id="btn-menu" data-section="menu">
        <span class="nav-icon" aria-hidden="true">🍽️</span>
        <span data-i18n="nav_menu">오늘의 식단</span>
      </button>

      <button type="button" class="btn nav-btn" id="btn-facility" data-section="facility">
        <span class="nav-icon" aria-hidden="true">🗺️</span>
        <span data-i18n="nav_facility">교내 시설</span>
      </button>

      <button type="button" class="btn nav-btn" id="btn-club" data-section="club">
        <span class="nav-icon" aria-hidden="true">👥</span>
        <span data-i18n="nav_club">동아리 안내</span>
      </button>
    </nav>

    <div id="meal-filter-bar" class="meal-filter">
      <button type="button" class="btn meal-btn active" id="btn-lunch" data-meal-time="LUNCH">
        <span class="nav-icon" aria-hidden="true">☀️</span>
        <span data-i18n="meal_lunch">중식 (Lunch)</span>
      </button>

      <button type="button" class="btn meal-btn" id="btn-dinner" data-meal-time="DINNER">
        <span class="nav-icon" aria-hidden="true">🌙</span>
        <span data-i18n="meal_dinner">석식 (Dinner)</span>
      </button>
    </div>

    <main id="content"></main>

    <div id="ai-modal" class="modal">
      <div class="modal-content">
        <button type="button" class="close" id="ai-modal-close" aria-label="Close">&times;</button>

        <h3>
          <span aria-hidden="true">✨</span>
          <span id="ai-modal-header">AI Cultural Guide</span>
        </h3>

        <div id="ai-result">Analyzing...</div>
      </div>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/app.js"></script>

  <footer class="footer">
    <p>© 2026 공강구조대 | 공강 시간, 어디서 보낼까?</p>
  </footer>
</body>
</html>
