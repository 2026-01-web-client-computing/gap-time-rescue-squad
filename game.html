<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공강구조대 | 게임</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a href="main.html" class="logo" data-i18n="site_logo">공강구조대</a>

            <ul class="nav-menu">
                <li><a href="main.html" data-i18n="nav_home">홈</a></li>
                <li><a href="team.html" data-i18n="nav_team">팀원 소개</a></li>
                <li><a href="game.html" class="active" data-i18n="nav_game">게임</a></li>
                <li><a href="form.html" data-i18n="nav_form">공강 추천</a></li>
            </ul>

            <select id="lang-selector" class="language-selector" aria-label="Language selector">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="zh">中文</option>
                <option value="ja">日本語</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="ru">Русский</option>
            </select>
        </nav>
    </header>


    <section class="page-hero">
        <p class="eyebrow" data-i18n="intro_eyebrow">CAMPUS FACILITY GAME</p>
        <h1 data-i18n-html="intro_title">캠퍼스 시설 학습 게임</h1>
        <p data-i18n="intro_desc">
            게임을 통해 학교 시설 정보를 재미있게 익혀보세요!
        </p>
    </section>
    <main class="main-container">
        <section id="intro-screen" class="screen">

            <div class="game-selection">
                <button type="button" class="card game-card" data-game-type="place">
                    <div class="icon">📍</div>
                    <h3 data-i18n="menu-place-title">장소 맞히기</h3>
                    <p data-i18n="menu-place-desc">사진을 보고 학교 시설을 맞춰보세요.</p>
                </button>
                <button type="button" class="card game-card" data-game-type="ox">
                    <div class="icon">◎ ✕</div>
                    <h3 data-i18n="menu-ox-title">OX 퀴즈</h3>
                    <p data-i18n="menu-ox-desc">학교 시설에 대한 OX 문제를 풀어보세요.</p>
                </button>
            </div>

            <div class="dashboard">
                <div class="card score-box" style="text-align: center; width: 100%;">
                    <h4 data-i18n="dash-my-score">내 최근 점수</h4>
                    <p id="my-score">0 / 5</p>
                </div>
            </div>
        </section>

        <section id="game-screen" class="screen hidden">
            <div class="game-header">
                <span id="question-number">Question 1/5</span>
                <span id="current-score-board"><span data-i18n="live-score">현재 점수</span>: <span id="live-score-val">0</span></span>
                <span id="timer">제한시간: 10초</span>
            </div>

            <div id="image-area" class="image-area hidden">
                <img id="place-img" src="" alt="시설 사진 준비중">
            </div>

            <div id="question-text" class="question-text"></div>

            <div id="options-area" class="options-area"></div>

            <div id="feedback-area" class="feedback-area hidden">
                <div id="feedback-result"></div>
                <div id="feedback-desc"></div>
                <button type="button" id="next-btn" class="btn btn-primary" data-i18n="btn-next">다음 문제</button>
            </div>
        </section>

        <section id="result-screen" class="screen hidden">
            <h2 data-i18n="result-title">게임 종료!</h2>

            <div class="final-score">
                <span data-i18n="result-score-label">최종 점수:</span>
                <span id="final-score-val">0</span> / 5
            </div>
            
            <button type="button" class="btn btn-primary retry-btn" id="retry-btn" data-i18n="btn-retry">처음으로 돌아가기</button>
        </section>
    </main>

    <footer class="footer">
      <p>© 2026 공강구조대 | 공강 시간, 어디서 보낼까?</p>
    </footer>

    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/game.js"></script>
</body>
</html>
