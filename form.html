<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공강구조대 | 공강 추천</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="main.html" class="logo">공강구조대</a>

      <ul class="nav-menu">
        <li><a href="main.html">홈</a></li>
        <li><a href="team.html">팀원 소개</a></li>
        <li><a href="game.html">게임</a></li>
        <li><a href="form.html" class="active">공강 추천</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">FREE PERIOD RESCUE</p>
      <h1>공강 시간,<br>어디서 보낼까?</h1>
      <p>
        공강 시간, 원하는 활동, 현재 위치를 입력하면
        지금 상황에 어울리는 학교 시설을 추천해드립니다.
      </p>
    </section>

    <section class="section form-section">
      <div class="section-title">
        <p class="eyebrow">RECOMMENDATION</p>
        <h2>공강 추천 받기</h2>
        <p>아래 정보를 선택하면 맞춤 장소를 확인할 수 있습니다.</p>
      </div>

      <div class="recommend-layout">
        <form id="recommendForm" class="recommend-form">
          <div class="form-group">
            <label for="time">공강 시간</label>
            <select id="time" required>
              <option value="">선택하세요</option>
              <option value="short">30분 이하</option>
              <option value="middle">1시간 정도</option>
              <option value="long">2시간 이상</option>
            </select>
          </div>

          <div class="form-group">
            <label for="activity">하고 싶은 활동</label>
            <select id="activity" required>
              <option value="">선택하세요</option>
              <option value="rest">쉬기</option>
              <option value="study">공부하기</option>
              <option value="meal">밥 먹기</option>
              <option value="cafe">카페 가기</option>
              <option value="walk">산책하기</option>
            </select>
          </div>

          <div class="form-group">
            <label for="location">현재 위치</label>
            <select id="location" required>
              <option value="">선택하세요</option>
              <option value="종합복지관">종합복지관</option>
              <option value="복지관">복지관</option>
              <option value="공학관">공학관</option>
              <option value="과학관">과학관</option>
              <option value="법학관">법학관</option>
              <option value="북악관">북악관</option>
              <option value="생활관">생활관</option>
              <option value="예술관">예술관</option>
              <option value="성곡도서관">성곡도서관</option>
              <option value="경상관">경상관</option>
              <option value="경영관">경영관</option>
              <option value="조형관">조형관</option>
              <option value="미래관">미래관</option>
              <option value="콘서트홀">콘서트홀</option>
            </select>
          </div>

          <div class="form-group">
            <label for="language">사용 언어</label>
            <select id="language" required>
              <option value="ko">한국어</option>
              <option value="en">English</option>
              <option value="zh">中文</option>
              <option value="ja">日本語</option>
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="ru">Русский</option>
            </select>
          </div>

          <button type="submit" class="recommend-button">
            추천 받기
          </button>
        </form>

        <div class="result-panel">
          <p class="result-label">추천 결과</p>
          <div id="resultBox" class="result-box empty">
            조건을 선택하고 추천 받기 버튼을 눌러주세요.
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 공강구조대</p>
  </footer>

  <script src="assets/js/data2.js"></script>
  <script src="assets/js/form.js"></script>
</body>
</html>
